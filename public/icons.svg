<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8FFF"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4F8FFF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4F8FFF"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7B61FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7B61FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Widget frame -->
  <rect x="24" y="28" width="80" height="72" rx="8" fill="white" fill-opacity="0.95"/>

  <!-- Widget header bar -->
  <rect x="24" y="28" width="80" height="16" rx="8" fill="white"/>
  <rect x="24" y="36" width="80" height="8" fill="white"/>

  <!-- Window control dots -->
  <circle cx="32" cy="36" r="3" fill="#FF5F57"/>
  <circle cx="42" cy="36" r="3" fill="#FFBD2E"/>
  <circle cx="52" cy="36" r="3" fill="#28C840"/>

  <!-- Bar chart -->
  <rect x="32" y="58" width="10" height="32" rx="2" fill="url(#barGrad1)"/>
  <rect x="46" y="48" width="10" height="42" rx="2" fill="url(#barGrad2)"/>
  <rect x="60" y="52" width="10" height="38" rx="2" fill="url(#barGrad1)"/>
  <rect x="74" y="44" width="10" height="46" rx="2" fill="url(#barGrad2)"/>
  <rect x="88" y="56" width="10" height="34" rx="2" fill="url(#barGrad1)"/>

  <!-- GLM text on widget -->
  <text x="96" y="38" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4F8FFF" text-anchor="end">GLM</text>

  <!-- Pie chart indicator -->
  <circle cx="64" cy="76" r="12" fill="none" stroke="#E8E8E8" stroke-width="4"/>
  <path d="M64 76 L64 64 A12 12 0 0 1 74.4 82 Z" fill="#4F8FFF"/>

  <!-- Small accent sparkles -->
  <circle cx="100" cy="24" r="4" fill="#FFD700" fill-opacity="0.8"/>
  <circle cx="20" cy="90" r="3" fill="#FFD700" fill-opacity="0.6"/>
</svg>
